
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Sports Global</title>

<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
header {background:#000;padding:20px;text-align:center;font-size:24px;font-weight:bold;}
.container {display:flex;}
.products {flex:3;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:15px;}
.card {background:#1a1a1a;padding:10px;border-radius:10px;text-align:center;}
.card img {width:100%;height:180px;object-fit:cover;}
button {padding:8px;border:none;background:#00c853;color:#fff;cursor:pointer;}
.sidebar {flex:1;background:#111;padding:15px;height:100vh;overflow:auto;}
h3 {border-bottom:1px solid #333;padding-bottom:5px;}
</style>
</head>

<body>

<header>🌎 ELITE SPORTS GLOBAL</header>

<div class="container">

<div class="products" id="products"></div>

<div class="sidebar">

<h3>🛒 Carrinho</h3>
<ul id="cart"></ul>
Total: $<span id="total">0</span>
<br><br>
<button onclick="pagar()">Pagar (PIX)</button>

<h3>📦 Pedidos</h3>
<ul id="orders"></ul>

<h3>🚚 Envios</h3>
<ul id="shipping"></ul>

<h3>👤 Clientes</h3>
<ul id="clients"></ul>

<h3>💰 Faturamento</h3>
<p>Total: $<span id="revenue">0</span></p>

</div>

</div>

<script>

const produtos = [
{nome:"Camisa PSG 23/24",preco:89,img:"https://images.unsplash.com/photo-1600185365483-26d7a4cc7519"},
{nome:"Camisa Real Madrid",preco:95,img:"https://images.unsplash.com/photo-1599058917765-a780eda07a3e"},
{nome:"Camisa Barcelona",preco:92,img:"https://images.unsplash.com/photo-1618354691373-d851c5c3a990"},
{nome:"Camisa Manchester City",preco:88,img:"https://images.unsplash.com/photo-1521412644187-c49fa049e84d"},
{nome:"Chuteira Nike Mercurial",preco:150,img:"https://images.unsplash.com/photo-1600180758890-6c96d1c45ecf"},
{nome:"Chuteira Adidas Predator",preco:140,img:"https://images.unsplash.com/photo-1589187155475-76b0b8d7bda5"}
];

// gerar mais produtos
for(let i=0;i<20;i++){
produtos.push({
nome:"Produto Premium "+i,
preco:70+i,
img:"https://picsum.photos/300?random="+i
});
}

let cart=[];
let revenue=0;
let pedidos=[];
let clientes=["John USA","Carlos Brasil","Miguel Espanha","Lucas França"];

function render(){
let html="";
produtos.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.nome}</h4>
<p>$${p.preco}</p>
<button onclick='add(${JSON.stringify(p)})'>Comprar</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(p){
cart.push(p);
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach(p=>{
total+=p.preco;
html+=`<li>${p.nome} - $${p.preco}</li>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

function pagar(){
if(cart.length===0) return alert("Carrinho vazio");

let total=cart.reduce((a,b)=>a+b.preco,0);
revenue+=total;

let cliente=clientes[Math.floor(Math.random()*clientes.length)];

pedidos.push({cliente,total,status:"Enviado"});

document.getElementById("orders").innerHTML+=`<li>${cliente} - $${total}</li>`;
document.getElementById("shipping").innerHTML+=`<li>Pedido enviado para ${cliente}</li>`;
document.getElementById("clients").innerHTML+=`<li>${cliente}</li>`;
document.getElementById("revenue").innerText=revenue;

cart=[];
updateCart();

alert("Pagamento aprovado (PIX simulado) ✅");
}

render();

</script>

</body>
</html>
