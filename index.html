
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Sports Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    background: black;
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px;
    background: #111;
}

nav button {
    padding: 10px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

button.buy {
    margin-top: 10px;
    background: green;
    border: none;
    padding: 10px;
    color: white;
    cursor: pointer;
}

#cart {
    position: fixed;
    top: 0;
    right: 0;
    width: 300px;
    height: 100%;
    background: #111;
    padding: 15px;
    overflow-y: auto;
}

</style>
</head>

<body>

<header>🔥 ELITE SPORTS STORE 🔥</header>

<nav>
<button onclick="filter('all')">Todos</button>
<button onclick="filter('nike')">Nike</button>
<button onclick="filter('adidas')">Adidas</button>
<button onclick="filter('time')">Times</button>
</nav>

<div class="products" id="products"></div>

<div id="cart">
<h3>Carrinho</h3>
<ul id="cartItems"></ul>
<h4>Total: R$ <span id="total">0</span></h4>
<button onclick="pix()">Pagar com PIX</button>
</div>

<script>

const produtos = [];

// gerar vários produtos
for(let i=1;i<=60;i++){
    let categoria = i%3==0 ? "nike" : i%2==0 ? "adidas" : "time";

    produtos.push({
        nome: "Produto "+i,
        preco: (100 + i*3),
        categoria,
        img: "https://picsum.photos/200?random="+i
    });
}

const container = document.getElementById("products");
const cartItems = document.getElementById("cartItems");

let cart = [];

function render(lista){
    container.innerHTML="";
    lista.forEach(p=>{
        container.innerHTML+=`
        <div class="card">
            <img src="${p.img}">
            <h4>${p.nome}</h4>
            <p>R$ ${p.preco}</p>
            <button class="buy" onclick='addCart(${JSON.stringify(p)})'>Comprar</button>
        </div>`;
    });
}

function filter(cat){
    if(cat==="all") render(produtos);
    else render(produtos.filter(p=>p.categoria===cat));
}

function addCart(p){
    cart.push(p);
    updateCart();
}

function updateCart(){
    cartItems.innerHTML="";
    let total=0;

    cart.forEach(p=>{
        total+=p.preco;
        cartItems.innerHTML+=`<li>${p.nome} - R$ ${p.preco}</li>`;
    });

    document.getElementById("total").innerText = total;
}

function pix(){
    alert("Pagamento via PIX simulado ✅\\nPedido registrado!");
}

render(produtos);

</script>

</body>
</html>
